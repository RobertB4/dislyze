name: Lugia Frontend E2E Tests

on:
  push:
    branches: [main]
    paths:
      - 'lugia-frontend/**'
      - '!lugia-frontend/test/**'
      - 'lugia-backend/**'
      - '!lugia-backend/test/**'
      - 'jirachi/**'
      - 'zoroark/**'
      - 'database/**'
      - '.github/workflows/lugia-frontend-e2e-tests.yml'
  pull_request:
    paths:
      - 'lugia-frontend/**'
      - '!lugia-frontend/test/**'
      - 'lugia-backend/**'
      - '!lugia-backend/test/**'
      - 'jirachi/**'
      - 'zoroark/**'
      - 'database/**'
      - '.github/workflows/lugia-frontend-e2e-tests.yml'

jobs:
  e2e-test:
    name: Run lugia-frontend E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run E2E tests
        working-directory: ./lugia-frontend
        run: npm run test-e2e -- --ci
