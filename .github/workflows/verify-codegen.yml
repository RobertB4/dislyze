name: Verify Code Generation

on:
  push:
    branches: [main]
    paths:
      - "database/migrations/**"
      - "jirachi/queries_pregeneration/**"
      - "lugia-backend/queries_pregeneration/**"
      - "lugia-backend/features/**"
      - "lugia-backend/cmd/openapi/**"
      - "giratina-backend/queries_pregeneration/**"
      - "giratina-backend/features/**"
      - "giratina-backend/cmd/openapi/**"
      - "**/sqlc.yaml"
      - ".github/workflows/verify-codegen.yml"
  pull_request:
    paths:
      - "database/migrations/**"
      - "jirachi/queries_pregeneration/**"
      - "lugia-backend/queries_pregeneration/**"
      - "lugia-backend/features/**"
      - "lugia-backend/cmd/openapi/**"
      - "giratina-backend/queries_pregeneration/**"
      - "giratina-backend/features/**"
      - "giratina-backend/cmd/openapi/**"
      - "**/sqlc.yaml"
      - ".github/workflows/verify-codegen.yml"

jobs:
  verify-codegen:
    name: Verify generated code is up to date
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.30.0

      - name: Install frontend dependencies
        run: |
          cd lugia-frontend && npm ci
          cd ../giratina-frontend && npm ci

      - name: Run code generation
        run: make generate

      - name: Check for uncommitted changes
        run: |
          if ! git diff --exit-code; then
            echo ""
            echo "ERROR: Generated code is out of date."
            echo "Run 'make generate' and commit the results."
            exit 1
          fi
