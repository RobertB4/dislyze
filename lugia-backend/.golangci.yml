version: "2"

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
    - misspell
    - auditcheck
  disable:
    - gocyclo
  settings:
    custom:
      auditcheck:
        type: "module"
        description: "Ensures InsertAuditLog errors are returned, not silently dropped (compliance)"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

